name: academic-advisor

services:
  mysql:
    image: mysql:8.4
    container_name: academic-advisor-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-password}
      MYSQL_DATABASE: academic_advisor_db
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${DB_PASSWORD:-password}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - academic-advisor-net

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: academic-advisor-backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      DB_USERNAME: root
      DB_PASSWORD: ${DB_PASSWORD:-password}
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/academic_advisor_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
      JWT_SECRET: ${JWT_SECRET:-3a8f2b1c9d4e7f0a5b6c3d2e1f8a9b0c3a8f2b1c9d4e7f0a5b6c3d2e1f8a9b0c}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-your-api-key-here}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      HUGGINGFACE_API_KEY: ${HUGGINGFACE_API_KEY:-}
      HUGGINGFACE_ENDPOINT_URL: ${HUGGINGFACE_ENDPOINT_URL:-}
      SEED_ENABLED: ${SEED_ENABLED:-true}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
      MAIL_HOST: ${MAIL_HOST:-smtp.gmail.com}
      MAIL_PORT: ${MAIL_PORT:-587}
      MAIL_USERNAME: ${MAIL_USERNAME:-}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-}
    ports:
      - "8080:8080"
    networks:
      - academic-advisor-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: academic-advisor-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "3000:80"
    networks:
      - academic-advisor-net

networks:
  academic-advisor-net:
    driver: bridge

volumes:
  mysql_data:
