# =============================================
# APPLICATION
# =============================================
spring.application.name=academic-advisor
server.port=8080

# =============================================
# DATABASE - MySQL
# =============================================
spring.datasource.url=jdbc:mysql://localhost:3306/academic_advisor_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:password}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# =============================================
# JWT SECURITY
# =============================================
app.jwt.secret=${JWT_SECRET:3a8f2b1c9d4e7f0a5b6c3d2e1f8a9b0c3a8f2b1c9d4e7f0a5b6c3d2e1f8a9b0c}
app.jwt.expiration-ms=86400000

# =============================================
# SPRING AI - Groq (OpenAI-compatible API)
# =============================================
spring.ai.openai.api-key=${GROQ_API_KEY:}
spring.ai.openai.base-url=https://api.groq.com/openai
spring.ai.openai.chat.options.model=llama-3.3-70b-versatile
spring.ai.openai.chat.options.temperature=0.7

# =============================================
# SPRING AI - Active chat model selection
# =============================================
spring.ai.model.chat=openai

# Disable OpenAI embedding auto-config (Groq has no embedding endpoint;
# we provide a local TF-IDF EmbeddingModel for the RAG module instead)
spring.autoconfigure.exclude=org.springframework.ai.model.openai.autoconfigure.OpenAiEmbeddingAutoConfiguration

# =============================================
# FILE UPLOAD
# =============================================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# =============================================
# DATA SEEDING (demo data on startup)
# =============================================
app.seed.enabled=${SEED_ENABLED:true}

# =============================================
# PASSWORD RESET
# =============================================
app.frontend-url=${FRONTEND_URL:http://localhost:3000}

# =============================================
# MAIL (SMTP – configure for production)
# =============================================
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# =============================================
# CORS
# =============================================
app.cors.allowed-origins=http://localhost:3000,http://localhost:5173
